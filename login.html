<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 | 문제아 問·題·兒</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;background:#F8F6F3;color:#1A1A2E;min-height:100vh;display:flex;flex-direction:column;}
    .nav{background:#1A1A2E;padding:14px 40px;display:flex;justify-content:space-between;align-items:center;}
    .nav-logo{font-family:'Noto Serif KR',serif;color:white;font-size:15px;font-weight:700;text-decoration:none;}
    .nav-back{color:rgba(255,255,255,0.5);font-size:13px;text-decoration:none;}
    .nav-back:hover{color:white;}

    .layout{display:grid;grid-template-columns:1fr 1fr;flex:1;min-height:calc(100vh - 52px);}

    .brand-panel{background:#1A1A2E;padding:60px 56px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;}
    .brand-panel::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(139,26,47,0.3) 0%,transparent 70%);pointer-events:none;}
    .brand-tag{font-size:12px;letter-spacing:3px;color:rgba(255,255,255,0.85);text-transform:uppercase;margin-bottom:24px;display:block;font-weight:500;}
    .brand-title{font-family:'Noto Serif KR',serif;font-size:34px;font-weight:700;color:white;line-height:1.45;margin-bottom:20px;}
    .brand-title em{color:#E8A0AA;font-style:normal;}
    .brand-desc{font-size:14px;color:rgba(255,255,255,0.55);line-height:1.9;margin-bottom:40px;}
    .brand-quote{margin-top:40px;padding:18px 20px;border-left:2px solid #8B1A2F;background:rgba(255,255,255,0.04);border-radius:0 8px 8px 0;}
    .brand-quote p{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.8;font-style:italic;}
    .brand-quote cite{display:block;margin-top:8px;font-size:11px;color:rgba(255,255,255,0.3);font-style:normal;letter-spacing:1px;}

    .form-panel{background:#F8F6F3;padding:60px 56px;display:flex;flex-direction:column;justify-content:center;}
    .form-header{margin-bottom:36px;}
    .form-header-tag{font-size:10px;letter-spacing:3px;color:#8B1A2F;text-transform:uppercase;margin-bottom:10px;display:block;}
    .form-header h1{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:700;color:#1A1A2E;margin-bottom:8px;}
    .form-header p{font-size:13px;color:#999;line-height:1.7;}

    .form-group{margin-bottom:18px;}
    .form-label{font-size:12px;color:#555;font-weight:500;margin-bottom:7px;display:block;}
    .form-input{width:100%;padding:13px 16px;border:1.5px solid #E0DDD8;border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:#1A1A2E;background:white;transition:all 0.2s;outline:none;}
    .form-input:focus{border-color:#1A1A2E;box-shadow:0 0 0 3px rgba(26,26,46,0.06);}
    .form-input::placeholder{color:#C5C0BC;}

    .submit-btn{width:100%;padding:15px;background:#1A1A2E;color:white;border:none;border-radius:8px;font-size:15px;font-family:'Noto Serif KR',serif;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;}
    .submit-btn:hover{background:#8B1A2F;transform:translateY(-1px);}
    .submit-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

    .signup-link{text-align:center;margin-top:20px;font-size:13px;color:#AAA;}
    .signup-link a{color:#1A1A2E;font-weight:500;text-decoration:none;border-bottom:1px solid #1A1A2E;padding-bottom:1px;}
    .signup-link a:hover{color:#8B1A2F;border-color:#8B1A2F;}

    .forgot-link{text-align:right;margin-top:6px;}
    .forgot-link a{font-size:12px;color:#AAA;text-decoration:none;}
    .forgot-link a:hover{color:#1A1A2E;}

    .error-msg{background:#FFF0F0;border:1px solid #FFD0D0;border-radius:8px;padding:12px 16px;font-size:13px;color:#8B1A2F;margin-bottom:16px;display:none;}

    @media(max-width:768px){
      .layout{grid-template-columns:1fr;}
      .brand-panel{display:none;}
      .form-panel{padding:40px 24px;}
      .nav{padding:14px 20px;}
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="index.html">← 홈으로</a>
  <a class="nav-logo" href="index.html">문제아 問·題·兒</a>
  <div style="font-size:12px;color:rgba(255,255,255,0.3);">하이애비뉴</div>
</nav>

<div class="layout">
  <div class="brand-panel">
    <span class="brand-tag">하이애비뉴 스페셜 프로그램</span>
    <div class="brand-title">생각하는 아이가<br><em>합격하는 아이</em>입니다.</div>
    <div class="brand-desc">
      특목고·자사고 면접에서 선발되는 학생은<br>
      답을 아는 아이가 아니라, 논리를 가진 아이입니다.
    </div>
    <div class="brand-quote">
      <p>"범용 AI는 정답을 생성하고,<br>하이애비뉴는 학생의 논리 오류를 감지해<br>다음 질문을 생성합니다."</p>
      <cite>— 하이애비뉴 박정아 원장</cite>
    </div>
  </div>

  <div class="form-panel">
    <div class="form-header">
      <span class="form-header-tag">Welcome Back</span>
      <h1>로그인</h1>
      <p>하이애비뉴 스페셜 코칭에 오신 것을 환영합니다.</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label class="form-label">이메일</label>
      <input class="form-input" type="email" placeholder="example@email.com" id="email" />
    </div>

    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input class="form-input" type="password" placeholder="비밀번호를 입력해주세요" id="pw" onkeydown="if(event.key==='Enter')doLogin()" />
      <div class="forgot-link"><a href="#" onclick="resetPassword()">비밀번호를 잊으셨나요?</a></div>
    </div>

    <button class="submit-btn" id="loginBtn" onclick="doLogin()">로그인 →</button>

    <div class="signup-link">
      아직 회원이 아니신가요? <a href="signup.html">회원가입하기</a>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC-hbGx1qjuVrkDft39wDHvDgTDAC55clg",
    authDomain: "munjea.firebaseapp.com",
    projectId: "munjea",
    storageBucket: "munjea.firebasestorage.app",
    messagingSenderId: "334629459791",
    appId: "1:334629459791:web:9440d98367b08624ad173a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.doLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('pw').value;
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('loginBtn');

    if (!email || !pw) {
      errorMsg.textContent = '이메일과 비밀번호를 입력해주세요.';
      errorMsg.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = '로그인 중...';
    errorMsg.style.display = 'none';

    try {
      await signInWithEmailAndPassword(auth, email, pw);
      // 로그인 성공 → 코칭 페이지로 이동
      window.location.href = 'coach.html';
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '로그인 →';
      if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
        errorMsg.textContent = '이메일 또는 비밀번호가 올바르지 않아요.';
      } else if (e.code === 'auth/too-many-requests') {
        errorMsg.textContent = '로그인 시도가 너무 많아요. 잠시 후 다시 시도해주세요.';
      } else {
        errorMsg.textContent = '오류가 발생했어요: ' + e.message;
      }
      errorMsg.style.display = 'block';
    }
  };

  window.resetPassword = async function() {
    const email = document.getElementById('email').value.trim();
    if (!email) {
      alert('이메일을 먼저 입력해주세요.');
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      alert('비밀번호 재설정 이메일을 보냈어요. 메일함을 확인해주세요!');
    } catch(e) {
      alert('이메일 전송 실패: ' + e.message);
    }
  };
</script>
</body>
</html>
