<div id="screen-select">
  <span class="screen-tag">High Avenue School Pack</span>
  <div class="screen-title">학교별 질문을 골라 바로 코칭하세요</div>

  <div class="school-tabs" id="school-tabs"></div>
  <div class="school-summary" id="school-summary"></div>
  <div class="type-tabs">
    <button class="type-tab active" onclick="switchType('all',this)">전체</button>
    <button class="type-tab" onclick="switchType('support',this)">지원동기</button>
    <button class="type-tab" onclick="switchType('study',this)">자기주도학습</button>
    <button class="type-tab" onclick="switchType('personality',this)">인성·공동체</button>
    <button class="type-tab" onclick="switchType('future',this)">진로·성장</button>
  </div>
  <div class="q-grid" id="question-grid"></div>
</div>

<div id="screen-coach">

    <div class="coach-question" id="coach-question-text"></div>
    <div class="coach-desc" id="coach-desc-text"></div>
  </div>

  <div class="input-area" id="input-area">
    <span class="input-label">내 답변 입력</span>
    <div class="input-wrap">
      <textarea id="answer-input" placeholder="답변을 입력해주세요..."></textarea>
      <button class="send-btn" onclick="submitAnswer()">제출 →</button>
    </div>
    <div class="round-info"><span id="round-text">1라운드 · 첫 번째 답변</span><div class="round-dots"><div class="dot active" id="dot-1"></div><div class="dot" id="dot-2"></div><div class="dot" id="dot-3"></div></div></div>
  </div>
  <div id="complete-area" style="display:none;">
    <div class="complete-card">
      <div style="font-size:40px;margin-bottom:16px;">🎯</div>
      <div class="complete-title">학교별 코칭 완료!</div>
      <div class="complete-sub">질문 흐름과 답변 구조를 한번에 점검했어요. 다음 질문으로 바로 이어가면 좋아요.</div>
      <div class="score-card" id="final-score"></div>
    </div>
    <div style="text-align:center;">
      <button class="restart-btn" onclick="restartCoach()">같은 질문 다시 하기</button>
      <button class="back-btn" onclick="goBack()">← 질문 목록으로</button>
    </div>
  </div>
</div>

  ],
  hafs:[
    {type:'support', label:'지원동기', q:'외대부고를 목표로 하게 된 계기는 무엇인가요?', hint:'처음 마음이 움직인 지점을 말해보세요.'},
    {type:'study', label:'자기주도학습', q:'학업 강도가 높은 환경에서 버틸 수 있는 본인만의 루틴이 있나요?', hint:'아침/저녁/주간 루틴 중 하나라도.'},
    {type:'study', label:'자기주도학습', q:'영어를 단순한 과목이 아니라 도구로 사용한 경험이 있나요?', hint:'읽기, 듣기, 발표, 탐구 모두 가능.'},
    {type:'personality', label:'인성·공동체', q:'실력이 뛰어난 친구들 사이에서 위축되지 않으려면 무엇이 필요하다고 생각하나요?', hint:'비교 대신 성장 기준을 말해보세요.'},
    {type:'future', label:'진로·성장', q:'외대부고에서 배우고 싶은 것은 성적 말고 무엇인가요?', hint:'태도, 문화, 사고방식도 좋아요.'},
    {type:'support', label:'학교적합성', q:'외대부고가 본인을 뽑았을 때 얻는 장점은 무엇인가요?', hint:'학교 입장에서 답해보세요.'},
    {type:'personality', label:'인성·공동체', q:'잘하는 친구와 협업할 때 본인은 어떤 기여를 할 수 있나요?', hint:'리더가 아니어도 좋습니다.'},
    {type:'future', label:'진로·성장', q:'앞으로 3년 동안 본인의 영어 활용 능력을 어디까지 끌어올리고 싶나요?', hint:'막연함 말고 그림이 보여야 해요.'}
  ]
};

const coachPrompts = {
  support:[
    '그 이유를 한 문장으로 먼저 압축해볼래요?',
    '학교 특징과 본인 경험이 정확히 어디에서 만나는지 더 말해볼 수 있을까요?'
  ],
  study:[
    '방법을 말했는데, 그 방법이 왜 효과 있었는지 원리까지 설명해볼래요?',
    '실패하거나 흔들린 순간을 하나 넣으면 답이 더 살아날 것 같아요. 어떤 순간이 있었나요?'
  ],
  personality:[
    '좋은 태도라고만 말하지 말고, 실제 행동 순서를 말해볼까요?',
    '그 상황에서 본인의 기준이 무엇인지 더 선명하게 드러내보세요.'
  ],
  future:[
    '미래 목표가 조금 추상적이에요. 3년 안에 보이는 모습으로 바꿔볼까요?',
    '그 성장이 왜 중요한지, 진로와 연결해서 한 번 더 밀어보세요.'
  ]
};

let currentSchool = 'mdf';
let currentType = 'all';
let currentQ = null; let round = 0; let answers = [];

function renderSchoolTabs(){
  const wrap = document.getElementById('school-tabs');
  wrap.innerHTML = Object.entries(schoolMeta).map(([k,v])=>`<button class="school-tab ${k===currentSchool?'active':''}" onclick="switchSchool('${k}',this)">${v.name}</button>`).join('');
  renderSchoolSummary();
}
function renderSchoolSummary(){
  const s = schoolMeta[currentSchool];
  document.getElementById('school-summary').innerHTML = `<div class="school-badge">${s.short.replace(/\n/g,'<br>')}</div><div><h3>${s.name} 질문 묶음</h3><p>${s.summary}</p></div>`;
}
function switchSchool(key,el){ currentSchool = key; document.querySelectorAll('.school-tab').forEach(b=>b.classList.remove('active')); el.classList.add('active'); renderSchoolSummary(); renderQuestions(); }
function switchType(type,el){ currentType = type; document.querySelectorAll('.type-tab').forEach(b=>b.classList.remove('active')); el.classList.add('active'); renderQuestions(); }
function renderQuestions(){
  const items = questionData[currentSchool].filter(x=>currentType==='all' || x.type===currentType);
  document.getElementById('question-grid').innerHTML = items.map((q,i)=>`<div class="q-card ${i%3===0?'burg':''}" onclick='startCoach(${JSON.stringify(q).replace(/'/g,"&#39;")})'><div class="q-card-type">${schoolMeta[currentSchool].name} · ${q.label}</div><div class="q-card-text">${q.q}</div><div class="q-card-hint">${q.hint} →</div></div>`).join('');
}

function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function addBubble(kind,label,text,right=false,extra=''){
  const area = document.getElementById('chat-area');
  document.getElementById('chat-empty')?.remove();
  const row = document.createElement('div'); row.className = 'chat-row'+(right?' right':'');
  row.innerHTML = right ? `<div class="bubble bubble-student"><div class="b-label">${label}</div>${escapeHtml(text)}</div>` : `${kind==='ai'?'<div class="ai-avatar">AI</div>':''}<div class="bubble ${kind==='ai'?'bubble-ai':'bubble-feedback'}"><div class="b-label">${label}</div>${escapeHtml(text)}${extra}</div>`;
  area.appendChild(row); area.scrollTop = area.scrollHeight;
}
function startCoach(q){
  currentQ = q; round = 0; answers = [];
  document.getElementById('screen-select').style.display='none';
  document.getElementById('screen-coach').style.display='block';
  document.getElementById('complete-area').style.display='none';
  document.getElementById('input-area').style.display='block';
  document.getElementById('chat-area').innerHTML = '<div class="chat-empty" id="chat-empty">답변을 입력하면 학교별 코칭이 시작됩니다</div>';
  document.getElementById('coach-type-label').textContent = `${schoolMeta[currentSchool].name} · ${q.label}`;
  document.getElementById('coach-question-text').textContent = q.q;
  document.getElementById('coach-desc-text').textContent = q.hint;
  document.getElementById('answer-input').value='';
  updateRoundUI();
}
function submitAnswer(){
  const input = document.getElementById('answer-input');
  const text = input.value.trim(); if(!text) return;
  answers.push(text); addBubble('student', round===0?'첫 답변':'수정 답변', text, true); input.value='';
  if(round < 2){
    const prompts = coachPrompts[currentQ.type] || coachPrompts.support;
    addBubble('ai', `코칭 질문 ${round+1}`, prompts[round]);
    round++; updateRoundUI();
  } else { finishCoach(); }
}
function updateRoundUI(){
  document.getElementById('round-text').textContent = `${round+1}라운드 · ${round===0?'첫 번째':'다음'} 답변`;
  [1,2,3].forEach(n=>{ const dot=document.getElementById('dot-'+n); dot.className='dot'+(n===round+1?' active':'')+(n<round+1?' done':''); });
}
function finishCoach(){
  const len = answers[answers.length-1].length;
  const structure = len>90?88:74, specificity = answers.some(a=>a.includes('예')||a.includes('경험')||a.includes('구체'))?86:78, growth = answers[answers.length-1].includes('앞으로')||answers[answers.length-1].includes('고등학교')?90:76;
  addBubble('feedback','최종 피드백','답변의 방향은 좋습니다. 이제 핵심 문장을 먼저 던지고, 경험 한 장면을 붙이고, 마지막에 학교에서의 성장으로 마무리하면 훨씬 상위권 답변에 가까워져요.',false,
    `<div class="score-row"><span class="score-badge">구조성 ${structure}</span><span class="score-badge">구체성 ${specificity}</span><span class="score-badge">성장연결 ${growth}</span></div><div class="good-point">좋았던 점 · 학교 질문에 맞게 자기 이야기를 끌어오려는 방향이 보여요.</div><div class="bad-point">보완 포인트 · '좋습니다/열심히' 같은 추상어 대신 실제 경험 한 장면을 더 넣어보세요.</div>`);
  document.getElementById('input-area').style.display='none';
  document.getElementById('complete-area').style.display='block';
  document.getElementById('final-score').innerHTML = `<div class="score-item"><div class="score-num">${structure}</div><div class="score-label">구조성</div></div><div class="score-item"><div class="score-num">${specificity}</div><div class="score-label">구체성</div></div><div class="score-item"><div class="score-num">${growth}</div><div class="score-label">성장 연결</div></div>`;
}
function restartCoach(){ if(currentQ) startCoach(currentQ); }
function goBack(){ document.getElementById('screen-coach').style.display='none'; document.getElementById('screen-select').style.display='block'; }

renderSchoolTabs(); renderQuestions();
</script>
</body>
</html>
